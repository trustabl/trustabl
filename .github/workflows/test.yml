name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CGO_ENABLED: "1" # tree-sitter is a C library; see ARCHITECTURE.md §9

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: vet
        run: go vet ./...

      - name: test
        run: go test -race ./...

      - name: build
        run: go build ./cmd/trustabl

  rules-sync:
    # Fail if the in-repo rules fixture has drifted from the production
    # trustabl-rules pack (a rule shipped but not mirrored, or vice versa).
    # See CLAUDE.md "Two-repo rule model".
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout trustabl-rules
        uses: actions/checkout@v4
        with:
          repository: trustabl/trustabl-rules
          path: .rules

      - name: Check fixture is in sync with production rules
        run: RULES_REPO="$GITHUB_WORKSPACE/.rules" bash scripts/check-rules-sync.sh
