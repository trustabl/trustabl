# Detect drift between the vendored AgentFormat schema (which the ACaC tests
# validate generated manifests against, offline) and the published schema at
# agentformat.org. Scheduled-only by design: an offline or forked PR must
# never break on a network fetch, but a silent upstream schema change must not
# go unnoticed either — a red scheduled run is the notification.
name: agentformat-schema-staleness

on:
  schedule:
    - cron: "17 6 * * 1" # weekly, Monday 06:17 UTC
  workflow_dispatch:

jobs:
  diff-vendored-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch the live published schema
        run: |
          curl -sSfL --retry 3 \
            https://agentformat.org/schema/1.0/agentformat-schema.json \
            -o live-schema.json

      - name: Diff against the vendored copy
        run: |
          if ! diff -u internal/acac/schema/agentformat-1.0.json live-schema.json; then
            echo "::warning::The published AgentFormat schema has drifted from the vendored copy."
            echo "Re-vendor internal/acac/schema/agentformat-1.0.json, re-run the acac tests"
            echo "(generated manifests must still validate), and review spec section 4 for"
            echo "field-level changes before updating."
            exit 1
          fi
          echo "Vendored schema matches the live URL."
