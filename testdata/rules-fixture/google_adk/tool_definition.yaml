policy:
  id: google_adk_tool_definition
  name: ADK tool definition hygiene
  category: google_adk
  description: >
    Hygiene rules for Google ADK FunctionTool-wrapped user functions —
    the same surfaces that drive tool-call self-correction for the model.

rules:
  - id: ADK-001
    title: FunctionTool-wrapped function has no docstring
    severity: low
    confidence: 0.8
    language: python
    applies_to:
      - adk_function_tool
    scope: tool
    match:
      has_docstring: false
    explanation: >
      Google ADK FunctionTool wraps a user-written function and exposes it
      to the model. ADK uses the function's docstring as the tool
      description that the model sees when deciding whether to call it. A
      tool with no docstring is a tool the model cannot reason about — it
      will under-call it or call it with the wrong arguments. This is the
      single highest-leverage authoring fix for ADK tools.
    fix: >
      Add a one-paragraph docstring describing what the tool does, what
      inputs it expects, and what it returns. The model reads this string
      verbatim.

  - id: ADK-002
    title: FunctionTool-wrapped function has no type-annotated parameters
    severity: medium
    confidence: 0.85
    language: python
    applies_to:
      - adk_function_tool
    scope: tool
    match:
      has_typed_params: false
    explanation: >
      Google ADK derives the JSON schema for a FunctionTool's parameters
      from the wrapped function's type annotations. A function with
      untyped parameters produces an underspecified schema — the model
      receives no type guidance and will pass arguments of the wrong
      type, which the SDK then rejects at validation time.
    fix: >
      Annotate every parameter with a concrete type (str, int, bool,
      list[str], Pydantic model, etc.). ADK propagates these into the
      schema the model sees.

  - id: ADK-007
    title: Ambiguous tool name
    severity: low
    confidence: 0.9
    language: python
    applies_to:
      - adk_function_tool
    scope: tool
    match:
      name_in:
        - process
        - handle
        - run
        - do
        - execute
        - perform
        - work
        - go
        - thing
        - stuff
    explanation: >
      Tool names like `process`, `handle`, or `run` give the model no signal
      about intent. The model will either call this tool for the wrong job or
      refuse to call it at all when a better-named alternative is present.
    fix: >
      Rename to a verb-object form, e.g. `summarize_document`, `fetch_order`.
