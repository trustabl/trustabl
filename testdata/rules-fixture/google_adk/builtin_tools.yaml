policy:
  id: google_adk_builtin_tools
  name: ADK built-in tool safety configuration
  category: google_adk
  description: >
    Rules that flag unsafe configurations on Google ADK built-in tool
    classes (BashTool, etc.). Their safety kwargs must be set explicitly —
    the defaults are permissive.

rules:
  - id: ADK-008
    title: Agent grants BashTool with no restrictive command policy
    severity: critical
    confidence: 0.75
    language: python
    applies_to:
      - adk_llm_agent
    scope: agent
    match:
      all:
        - agent_uses_hosted_tool_class: [BashTool]
        - not:
            agent_hosted_tool_kwarg_present:
              class: BashTool
              kwarg: policy
    explanation: >
      This LlmAgent grants BashTool with no explicit policy=. BashTool runs
      shell commands chosen by the model, and its BashToolPolicy defaults to
      allowed_command_prefixes=("*",) (every command) and blocked_operators=()
      (no shell metacharacters blocked) — i.e. fully injectable. Without a
      restrictive policy, model-supplied input reaches the shell with no
      command allow-list and no operator filtering. (Earlier google-adk exposed
      a block_shell_metacharacters kwarg; current ADK gates this through
      BashToolPolicy instead.)
    fix: >
      Construct BashTool with a restrictive policy=BashToolPolicy(...): set
      allowed_command_prefixes to the specific commands the agent needs and
      blocked_operators to deny shell metacharacters. Pair with a
      before_tool_callback that validates the command before execution.
