policy:
  id: google_adk_network
  name: ADK tool network hygiene
  category: google_adk
  description: >
    Network-call hygiene inside FunctionTool-wrapped functions.

rules:
  - id: ADK-003
    title: Network call has no timeout
    severity: high
    confidence: 0.85
    language: python
    applies_to:
      - adk_function_tool
    scope: tool
    match:
      call_without_kwarg:
        callees:
          - requests.get
          - requests.post
          - requests.put
          - requests.delete
          - requests.patch
          - requests.head
          - requests.request
          - httpx.get
          - httpx.post
          - httpx.put
          - httpx.delete
          - httpx.patch
          - httpx.head
          - httpx.request
        missing: timeout
    explanation: >
      An ADK tool that makes a network request without a timeout will
      hang indefinitely on a slow or unresponsive remote. ADK has no
      tool-level timeout — the entire agent loop blocks until the
      request returns. Under load, this exhausts whatever runtime ADK is
      hosted on (Cloud Run, Vertex AI, a local process) without ever
      surfacing the failure to the model.
    fix: >
      Pass `timeout=` (typically 5–30 seconds) to the request. Choose a
      value that's tight enough to fail fast and loose enough to allow
      legitimate slow responses for this endpoint.
