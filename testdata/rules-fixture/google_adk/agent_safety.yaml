policy:
  id: google_adk_agent_safety
  name: ADK agent safety
  category: google_adk
  description: >
    Agent-scope safety rules for Google ADK LlmAgents and workflow
    agents. Covers description hygiene, callback-based interception
    of shell tools, and sub-agent shell exposure.

rules:
  - id: ADK-101
    title: LlmAgent has no description
    severity: medium
    confidence: 0.85
    language: python
    applies_to:
      - adk_llm_agent
    scope: agent
    match:
      all:
        - agent_class: [LlmAgent]
        - agent_kwarg_missing: [description]
    explanation: >
      Google ADK routes delegation between agents using the
      `description=` field on each LlmAgent. When a parent agent
      decides whether to delegate to a child in its `sub_agents` tree,
      the model sees only the child's description. An agent with no
      description becomes effectively unreachable through delegation —
      it sits in the tree but the parent's model has no signal to pick
      it. This usually shows up as a silent routing bug.
    fix: >
      Add a `description=` kwarg that names this agent's role and the
      kind of input it expects. One sentence is usually enough. Treat
      it as documentation for the parent agent's model.

  - id: ADK-102
    title: Agent with BashTool has no before_tool_callback
    severity: high
    confidence: 0.85
    language: python
    applies_to:
      - adk_llm_agent
    scope: agent
    match:
      all:
        - agent_class: [LlmAgent]
        - agent_uses_hosted_tool_class: [BashTool]
        - agent_kwarg_missing: [before_tool_callback]
    explanation: >
      An LlmAgent with `BashTool` in its tools= list can execute
      arbitrary shell commands chosen by the model. ADK's
      `before_tool_callback` is the only synchronous interception point
      where you can inspect a tool call before it executes and
      short-circuit it — the moral analog of an OpenAI agent's
      `input_guardrails`. An agent with BashTool and no
      `before_tool_callback` has no opportunity to deny a shell command
      the model invents.
    fix: >
      Add a `before_tool_callback=` that inspects the tool name and
      arguments, allow-lists known-safe commands (or denies known-bad
      ones), and returns a refusal `Content` when the call should be
      blocked. Returning anything non-None from the callback skips the
      tool execution.

  - id: ADK-103
    title: Sub-agent is granted BashTool
    severity: high
    confidence: 0.9
    language: python
    applies_to:
      - adk_llm_agent
    scope: agent
    match:
      all:
        - agent_is_subagent_of_any: true
        - agent_uses_hosted_tool_class: [BashTool]
    explanation: >
      This LlmAgent appears in another agent's `sub_agents=[...]` tree
      AND is granted `BashTool`. A parent agent can delegate to a
      child without the child's tool calls being mediated by the
      parent's `before_tool_callback`. Granting shell access to a
      delegated sub-agent makes the parent's policy worthless: the
      model can route around any safety hook by handing off to the
      sub-agent and asking it to run the same command.
    fix: >
      Either remove `BashTool` from this sub-agent's tools= list, or
      restructure so the shell-capable agent is the orchestrator at
      the top of the tree (so its `before_tool_callback` actually
      mediates every shell call).

  - id: ADK-104
    title: Agent has no safety_settings
    severity: medium
    confidence: 0.75
    language: python
    applies_to:
      - adk_llm_agent
    scope: agent
    match:
      all:
        - agent_class: [LlmAgent]
        - agent_kwarg_missing: [generate_content_config.safety_settings]
    explanation: >
      Google ADK agents use Gemini models whose configurable content filters
      default to OFF when safety_settings is not provided. safety_settings is
      not a top-level LlmAgent argument — it is set inside the agent's
      generate_content_config (a google-genai GenerateContentConfig). Harm
      categories including DANGEROUS_CONTENT, HATE_SPEECH, HARASSMENT, and
      SEXUALLY_EXPLICIT are not actively filtered when it is absent. In an
      agentic loop where model outputs drive subsequent tool calls, an
      unfiltered harmful output can propagate into real side effects.
    fix: >
      Pass safety_settings within the generate_content_config= given to the
      LlmAgent constructor, e.g. generate_content_config=types.GenerateContentConfig(
      safety_settings=[...]), with explicit HarmBlockThreshold values for each
      HarmCategory your use case requires. At minimum set DANGEROUS_CONTENT to
      BLOCK_LOW_AND_ABOVE for agents that touch external data or execute tools
      with side effects.

  - id: ADK-105
    title: Agent uses web search built-in without before_tool_callback
    severity: high
    confidence: 0.85
    language: python
    applies_to:
      - adk_llm_agent
    scope: agent
    match:
      all:
        - agent_class: [LlmAgent]
        - any:
            - agent_grants_builtin_tool: [google_search]
            - agent_uses_hosted_tool_class: [GoogleSearchTool, VertexAiSearchTool]
        - agent_kwarg_missing: [before_tool_callback]
    explanation: >
      This LlmAgent is wired with a web search built-in (the google_search
      instance, GoogleSearchTool, or VertexAiSearchTool) but has no
      before_tool_callback. Web search results are
      untrusted external data that can contain prompt injection payloads.
      Without a callback intercepting tool calls before execution, there is no
      gate to validate queries or block attacker-influenced invocations. An
      injected instruction retrieved from a prior search can direct the agent
      to issue further queries or pass malicious content to downstream tools.
    fix: >
      Pass before_tool_callback= to the LlmAgent constructor. The callback
      receives the tool name and parameters before execution; validate that the
      search query conforms to expected patterns and return a dict with an
      "error" key to block suspicious calls. Pair this with safety_settings= to
      filter harmful model outputs from processing search content.

  - id: ADK-106
    title: Agent has a code_executor but no before_model_callback
    severity: high
    confidence: 0.8
    language: python
    applies_to:
      - adk_llm_agent
    scope: agent
    match:
      all:
        - agent_class: [LlmAgent]
        - agent_kwarg_present: [code_executor]
        - agent_kwarg_missing: [before_model_callback]
    explanation: >
      This LlmAgent sets a code_executor, which lets the model emit code blocks
      that ADK extracts and runs. With an UnsafeLocalCodeExecutor this is
      arbitrary code execution in the agent process. The only synchronous gate
      over what the model emits is before_model_callback — before_tool_callback
      does not fire for code execution, because code blocks are not tool calls.
      An agent with a code_executor and no before_model_callback runs
      model-authored code with nothing inspecting it.
    fix: >
      Add a before_model_callback that inspects the assembled LlmRequest and
      rejects unsafe code, and prefer a sandboxed executor (ContainerCodeExecutor
      / VertexAiCodeExecutor) over UnsafeLocalCodeExecutor. Run the agent under
      OS-level isolation if local execution is unavoidable.

  - id: ADK-107
    title: Agent grants AgentTool but has no before_tool_callback
    severity: high
    confidence: 0.7
    language: python
    applies_to:
      - adk_llm_agent
    scope: agent
    match:
      all:
        - agent_class: [LlmAgent]
        - agent_uses_hosted_tool_class: [AgentTool]
        - agent_kwarg_missing: [before_tool_callback]
    explanation: >
      This LlmAgent wraps another agent as a callable via AgentTool but has no
      before_tool_callback. AgentTool delegates to the wrapped agent, whose own
      tool calls are not mediated by this agent's callbacks (and ADK does not
      transitively analyze the wrapped agent). The parent's before_tool_callback
      is the only point that sees the delegation call itself; without it, the
      model can route work into the delegated agent with no policy gate on the
      handoff.
    fix: >
      Add a before_tool_callback that inspects AgentTool invocations and the
      arguments passed to the delegated agent. Ensure the wrapped agent carries
      its own guardrails, since the parent cannot see past the delegation
      boundary.

  - id: ADK-108
    title: LoopAgent has no max_iterations
    severity: medium
    confidence: 0.7
    language: python
    applies_to:
      - adk_loop_agent
    scope: agent
    match:
      all:
        - agent_class: [LoopAgent]
        - agent_kwarg_missing: [max_iterations]
    explanation: >
      This LoopAgent sets no max_iterations, so it loops until a sub-agent
      escalates. An agentic loop with no iteration cap, driven by model output,
      is a cost and availability footgun: a model that never escalates spins
      indefinitely, burning tokens and wall-clock with no termination guarantee.
    fix: >
      Pass max_iterations= to the LoopAgent constructor with a bound appropriate
      to the workflow. If the loop is meant to terminate via a sub-agent's
      escalate action, still set a defensive cap so a missed escalation cannot
      run unbounded.

  - id: ADK-110
    title: Agent fetches web content via UrlContextTool/LoadWebPage without before_tool_callback
    severity: medium
    confidence: 0.7
    language: python
    applies_to:
      - adk_llm_agent
    scope: agent
    match:
      all:
        - agent_class: [LlmAgent]
        - agent_uses_hosted_tool_class: [UrlContextTool, LoadWebPage]
        - agent_kwarg_missing: [before_tool_callback]
    explanation: >
      This LlmAgent is wired with a URL/page-fetch built-in (UrlContextTool or
      LoadWebPage) but has no before_tool_callback. These tools retrieve
      model-chosen URLs whose content re-enters the agent loop — a prompt
      injection vector (attacker-controlled page content) and an SSRF surface
      (the model can point the fetch at internal addresses). Without a callback
      gating the call there is nothing to validate the target before the fetch
      runs. This extends ADK-105's web-search coverage to the direct-fetch tools.
    fix: >
      Add a before_tool_callback that allow-lists permitted hosts/URLs and blocks
      internal address ranges before the fetch executes. Treat fetched content as
      untrusted and avoid passing it directly into further tool calls.
