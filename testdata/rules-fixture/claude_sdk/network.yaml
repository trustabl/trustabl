policy:
  id: claude_sdk_network
  name: Network call hygiene
  category: claude_sdk
  description: >
    Rules covering outbound network calls made from inside agent tools. The
    SDK does not enforce network reliability guarantees (timeouts, retries)
    on its own — these checks make sure tool authors set them explicitly.

rules:
  - id: CSDK-003
    title: Network call has no timeout
    severity: high
    confidence: 0.85
    language: python
    applies_to:
      - claude_sdk_tool
    scope: tool
    match:
      call_without_kwarg:
        callees:
          - requests.get
          - requests.post
          - requests.put
          - requests.delete
          - requests.patch
          - requests.head
          - requests.request
          - requests.Session.get
          - requests.Session.post
          - httpx.get
          - httpx.post
          - httpx.put
          - httpx.delete
          - httpx.patch
          - httpx.head
          - httpx.request
          - urllib.request.urlopen
          # NOTE: these aiohttp.ClientSession.* entries match only DIRECT
          # calls of that literal text. The engine's alias resolver
          # canonicalizes a reused session (s = aiohttp.ClientSession();
          # s.get(...)) to `aiohttp.get` / `aiohttp.post`, which are NOT in
          # this list — so aliased aiohttp sessions are not yet caught. To
          # cover them, add `aiohttp.get` / `aiohttp.post` callees here.
          # (requests/httpx aliasing already works: their callee lists use the
          # `requests.get` / `httpx.post` form the resolver produces.)
          - aiohttp.ClientSession.get
          - aiohttp.ClientSession.post
        missing: timeout
    explanation: >
      An agent tool that makes a network request without a timeout can hang
      indefinitely, blocking the conversation loop and exhausting the agent's
      wall-clock budget. The SDK does not enforce timeouts for you.
    fix: >
      Pass `timeout=` (typically 5–30s) to the request. Surface failures as a
      structured error the model can react to.
