policy:
  id: claude_sdk_agent_safety
  name: Claude Agent SDK subagent wiring safety
  category: claude_sdk
  description: >
    Agent-scoped rules for the Claude Agent SDK. These fire per
    AgentDefinition(...) declaration and inspect the built-in tools the
    subagent is granted. AgentDefinition has no guardrail mechanism of its
    own, so the tools it is handed are the whole of its privilege surface.

rules:
  - id: CSDK-101
    title: Claude subagent is granted the Bash tool
    severity: high
    confidence: 0.8
    language: python
    applies_to:
      - claude_agent_definition
    scope: agent
    match:
      agent_grants_builtin_tool:
        - Bash
    explanation: >
      This AgentDefinition grants the built-in Bash tool, giving the
      subagent arbitrary shell-command execution. Subagents are dispatched
      autonomously by a lead agent in response to model-generated task
      descriptions, so a prompt-injected or mis-scoped task can reach the
      shell with no human in the loop. This is acute when the surrounding
      ClaudeAgentOptions sets permission_mode="bypassPermissions", which
      removes the SDK's interactive approval gate entirely.
    fix: >
      Remove "Bash" from this subagent's tools list unless shell execution
      is essential to its job. If it is essential, gate it with a
      PreToolUse hook that allowlists the specific commands the subagent
      may run, and do not pair it with permission_mode="bypassPermissions"
      at the ClaudeAgentOptions level.

  - id: CSDK-102
    title: Claude subagent is granted the WebSearch tool
    severity: medium
    confidence: 0.8
    language: python
    applies_to:
      - claude_agent_definition
    scope: agent
    match:
      agent_grants_builtin_tool:
        - WebSearch
    explanation: >
      This AgentDefinition grants the built-in WebSearch tool, giving the
      subagent access to live internet content. Subagents are dispatched
      autonomously by a lead agent; a prompt-injected or mis-scoped task can
      direct the subagent to retrieve attacker-controlled pages, whose content
      can then inject further instructions into the agentic loop. WebSearch
      results are untrusted external data with no SDK-level filtering — the
      subagent will process whatever the search returns.
    fix: >
      Remove "WebSearch" from this subagent's tools list unless internet access
      is essential to its job. If it is essential, gate inbound queries with a
      PreToolUse hook that validates the search query before it executes, and
      ensure the lead agent that dispatches this subagent validates task
      descriptions before passing them down.

  - id: CSDK-103
    title: AgentDefinition sets permissionMode to bypassPermissions
    severity: critical
    confidence: 0.9
    language: python
    applies_to:
      - claude_agent_definition
    scope: agent
    match:
      agent_kwarg_value:
        kwarg: permissionMode
        value: bypassPermissions
    explanation: >
      This AgentDefinition sets permissionMode="bypassPermissions", which
      disables the SDK's interactive approval gate for every tool the subagent
      runs. Subagents are dispatched autonomously by a lead agent in response to
      model-generated task descriptions, so a prompt-injected or mis-scoped task
      reaches the subagent's tools — including Bash, Write, and Edit — with no
      human in the loop and no per-call confirmation. This is the single
      highest-impact Claude-specific misconfiguration: it removes the one control
      that stands between model output and real side effects.
    fix: >
      Remove permissionMode="bypassPermissions" unless this subagent runs in a
      fully sandboxed, non-interactive context you control (e.g. CI with no
      secrets or network). If autonomous operation is required, pair it with a
      PreToolUse hook that allowlists exactly the commands and paths the subagent
      may touch, and prefer a restrictive mode ("default"/"acceptEdits") scoped
      to a minimal tool set.

  - id: CSDK-104
    title: Claude subagent is granted filesystem-write built-ins
    severity: high
    confidence: 0.8
    language: python
    applies_to:
      - claude_agent_definition
    scope: agent
    match:
      agent_grants_builtin_tool:
        - Write
        - Edit
        - MultiEdit
        - NotebookEdit
    explanation: >
      This AgentDefinition grants a filesystem-write built-in (Write, Edit,
      MultiEdit, or NotebookEdit), letting the subagent modify files on disk.
      Subagents are dispatched autonomously; a prompt-injected or mis-scoped
      task can drive the subagent to rewrite source, configuration, or even the
      .claude/settings.json that governs the agent's own permissions. Write
      access is comparable blast radius to shell execution (CSDK-101) and is not
      gated by any guardrail mechanism on AgentDefinition itself.
    fix: >
      Remove the write built-ins from this subagent's tools list unless file
      mutation is essential to its job. If it is essential, scope the writable
      area with add_dirs / cwd, gate writes with a PreToolUse hook, and never
      pair broad write access with permission_mode="bypassPermissions".

  - id: CSDK-105
    title: Claude subagent is granted the WebFetch tool
    severity: high
    confidence: 0.75
    language: python
    applies_to:
      - claude_agent_definition
    scope: agent
    match:
      agent_grants_builtin_tool:
        - WebFetch
    explanation: >
      This AgentDefinition grants the built-in WebFetch tool, which retrieves a
      model-chosen URL and feeds its content back into the agent loop. Unlike
      WebSearch (CSDK-102), WebFetch takes a direct URL, so it is both a
      prompt-injection vector (attacker-controlled page content re-enters the
      loop) and a server-side request forgery surface (the model can point it at
      internal addresses). Fetched content is untrusted external data with no
      SDK-level filtering.
    fix: >
      Remove "WebFetch" from this subagent's tools list unless fetching is
      essential. If it is essential, gate it with a PreToolUse hook that
      allowlists permitted hosts/URLs and blocks internal address ranges, and
      validate the task descriptions the lead agent passes down.

  - id: CSDK-120
    title: TypeScript AgentDefinition sets permissionMode to bypassPermissions
    severity: critical
    confidence: 0.9
    language: typescript
    applies_to:
      - claude_agent_definition
    scope: agent
    match:
      agent_kwarg_value:
        kwarg: permissionMode
        value: bypassPermissions
    explanation: >
      This TypeScript AgentDefinition sets permissionMode: "bypassPermissions",
      which disables the SDK's interactive approval gate for every tool the agent
      runs. Agents are dispatched autonomously in response to model-generated task
      descriptions, so a prompt-injected or mis-scoped task reaches the agent's
      tools — including Bash, Write, and Edit — with no human in the loop and no
      per-call confirmation. This is the single highest-impact Claude-specific
      misconfiguration: it removes the one control that stands between model output
      and real side effects.
    fix: >
      Remove permissionMode: "bypassPermissions" unless this agent runs in a
      fully sandboxed, non-interactive context you control (e.g. CI with no
      secrets or network). If autonomous operation is required, pass
      allowedTools or disallowedTools in the AgentDefinition constructor to
      restrict the tool surface, and prefer a safe default permission mode
      ("default" or "acceptEdits") scoped to a minimal tool set.

  - id: CSDK-130
    title: TypeScript query() main agent is granted the Bash tool
    severity: high
    confidence: 0.8
    language: typescript
    applies_to:
      - claude_query_main
    scope: agent
    match:
      agent_grants_builtin_tool:
        - Bash
    explanation: >
      This `query(...)` call configures the main agent thread with "Bash" in
      its `options.allowedTools`, granting the top-level agent arbitrary
      shell-command execution. The main thread acts directly on model output in
      the conversation loop, so a prompt-injected instruction reaches the OS
      shell with no subagent boundary in between. This is the broadest privilege
      a Claude TypeScript agent can hold, and unlike the AgentDefinition and
      `.claude/agents` subagent rules, nothing else inspects the `query()` main
      thread's tool grant.
    fix: >
      Remove "Bash" from `options.allowedTools` unless shell execution is
      essential to the agent's task. If it is, pair it with a PreToolUse hook
      that allowlists the exact commands permitted, and do not run the session
      under permissionMode: "bypassPermissions".

  - id: CSDK-131
    title: TypeScript query() main agent is granted filesystem-write or web-fetch built-ins
    severity: high
    confidence: 0.75
    language: typescript
    applies_to:
      - claude_query_main
    scope: agent
    match:
      agent_grants_builtin_tool:
        - Write
        - Edit
        - MultiEdit
        - NotebookEdit
        - WebFetch
    explanation: >
      This `query(...)` main agent's `options.allowedTools` includes a
      filesystem-write built-in (Write/Edit/MultiEdit/NotebookEdit) or WebFetch.
      Write access lets a prompt-injected main agent rewrite source,
      configuration, or the `.claude/settings.json` that governs its own
      permissions; WebFetch pulls attacker-controllable URL content straight
      back into the loop, which is both a prompt-injection re-entry and a
      server-side request forgery surface. On the main thread these run with no
      subagent boundary and no SDK guardrail mechanism.
    fix: >
      Drop the write and fetch built-ins from `options.allowedTools` unless the
      task requires them. Scope writes to a dedicated working directory, gate
      them with a PreToolUse hook, and for fetching, allowlist permitted hosts
      and block internal, loopback, and link-local address ranges.
