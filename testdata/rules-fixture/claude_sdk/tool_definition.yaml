policy:
  id: claude_sdk_tool_definition
  name: Tool definition hygiene
  category: claude_sdk
  description: >
    Rules that govern how a Claude Agent SDK tool presents itself to the model
    via name, description, and parameter shape. Violations degrade the model's
    ability to select the right tool for a request.

rules:
  - id: CSDK-001
    title: Tool has no description
    severity: low
    confidence: 0.95
    language: python
    applies_to:
      - claude_sdk_tool
    scope: tool
    match:
      has_docstring: false
    explanation: >
      The Claude Agent SDK uses the tool's docstring as the description shown
      to the model. With no description, the model must guess from the
      function name when to call this tool — which causes mis-selection under
      ambiguous prompts.
    fix: >
      Add a one-paragraph docstring describing inputs, outputs, and when to
      use this tool.

  - id: CSDK-002
    title: Tool parameters are not type-annotated
    severity: medium
    confidence: 0.9
    language: python
    applies_to:
      - claude_sdk_tool
    scope: tool
    match:
      all:
        - has_params: true
        - has_typed_params: false
    explanation: >
      Without parameter type annotations, the SDK cannot generate an input
      schema to validate model output. The model can hallucinate parameter
      shapes the tool does not accept, and the failure surfaces at runtime as
      a TypeError instead of a clean validation error pre-invocation.
    fix: >
      Annotate every parameter with a type. Prefer pydantic models for nested
      args.

  - id: CSDK-007
    title: Ambiguous tool name
    severity: low
    confidence: 0.9
    language: python
    applies_to:
      - claude_sdk_tool
    scope: tool
    match:
      name_in:
        - process
        - handle
        - run
        - do
        - execute
        - perform
        - work
        - go
        - thing
        - stuff
    explanation: >
      Tool names like `process`, `handle`, or `run` give the model no signal
      about intent. The model will either call this tool for the wrong job or
      refuse to call it at all.
    fix: >
      Rename to a verb-object form, e.g. `summarize_invoice`, `refund_charge`.

  - id: CSDK-008
    title: Tool exposes **kwargs without explicit input_schema
    severity: medium
    confidence: 0.8
    language: python
    applies_to:
      - claude_sdk_tool
    scope: tool
    match:
      all:
        - param_name_matches:
            exact:
              - kwargs
        - not:
            tool_decorator_kwarg_present:
              - input_schema
    explanation: >
      The Claude Agent SDK derives a tool's JSON input schema from the
      function signature. A tool whose accepted arguments live entirely under
      `**kwargs` has no typed surface for the SDK to introspect, so the model
      sees an empty parameter object and gets no signal about which keys to
      send. Calls then either omit data the body requires or invent keys the
      body does not handle, and the failure surfaces as a runtime KeyError at
      invoke time instead of a clean schema-validation error before the tool
      ever runs.
    fix: >
      Either declare each accepted parameter on the function signature with a
      type annotation so the SDK can derive the schema, or pass an explicit
      `input_schema=` to the `@tool` decorator — either a JSON Schema dict or
      a Pydantic `BaseModel` subclass — so the contract published to the model
      matches what the body actually reads from `kwargs`.

  - id: CSDK-014
    title: TypeScript Claude SDK tool has no description
    severity: low
    confidence: 0.9
    language: typescript
    applies_to:
      - claude_sdk_tool
    scope: tool
    match:
      has_docstring: false
    explanation: >
      The Claude Agent SDK passes a TypeScript tool's description — the second
      argument to `tool(name, description, schema, handler)` — to the model as
      the sole signal for when to invoke it. With an empty or missing
      description the model must guess from the tool name alone, causing
      mis-selection under ambiguous prompts: the tool is called for the wrong
      job, or skipped when it was the right one. Unlike the Python SDK, which
      derives the description from the function docstring, the TypeScript
      factory takes it as an explicit argument, so omitting it is a silent gap
      rather than a syntax error.
    fix: >
      Pass a clear one-line description as the second argument to
      `tool(name, description, schema, handler)`, stating what the tool does,
      what it returns, and when the model should reach for it.
