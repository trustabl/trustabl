policy:
  id: claude_sdk_ssrf
  name: Server-side request forgery
  category: claude_sdk
  description: >
    Rules covering outbound HTTP requests whose destination URL is not a
    fixed literal. A tool that fetches a caller- or model-controlled URL can
    be steered at internal services the agent host can reach.

rules:
  - id: CSDK-009
    title: Tool fetches a caller-controlled URL (SSRF)
    severity: high
    confidence: 0.6
    language: python
    applies_to:
      - claude_sdk_tool
      - mcp_tool
    scope: tool
    match:
      has_dynamic_url_call: true
    explanation: >
      This tool issues an HTTP request to a URL built from a parameter or an
      interpolated string rather than a fixed literal. Because the agent
      chooses the argument values it passes to a tool, a prompt-injected or
      adversarial conversation can drive the request at an arbitrary host —
      including internal addresses the agent's host can reach but the public
      internet cannot: cloud metadata endpoints (169.254.169.254) that vend
      credentials, link-local and loopback services, and internal admin APIs.
      This is server-side request forgery: the tool becomes a proxy for
      requests the attacker could not otherwise make.
    fix: >
      Don't fetch arbitrary URLs. Constrain the destination to an explicit
      allow-list of hosts (or a single fixed base URL with only a path
      parameter), reject requests to private, loopback, and link-local IP
      ranges after DNS resolution, and disable redirects to addresses outside
      the allow-list. If the tool only ever talks to one service, hard-code the
      base URL and accept just the path or query parameters.
