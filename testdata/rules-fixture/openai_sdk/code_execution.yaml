policy:
  id: openai_sdk_code_execution
  name: OpenAI Agents SDK dynamic code execution
  category: openai_sdk
  description: >
    Rules covering tool bodies that evaluate dynamic Python code. eval/exec/
    compile inside an @function_tool turns the agent process into an
    arbitrary-code-execution surface when any input flows from the model.

rules:
  - id: OAI-013
    title: Tool body calls eval/exec/compile on dynamic input
    severity: high
    confidence: 0.9
    language: python
    applies_to:
      - openai_tool
    scope: tool
    match:
      has_code_exec_call: true
    explanation: >
      The @function_tool body invokes Python's eval, exec, or compile. When
      any portion of the input flows from the model (directly or via session
      state the model writes to), the call is arbitrary-code-execution inside
      the agent process. Unlike subprocess, no OS-level sandbox stands between
      the call and the agent's full Python runtime: imports, file handles,
      and credentials in memory are all reachable from inside the exec'd
      string. Even an exec into a restricted globals dict is escapable via
      the __builtins__ chain unless explicitly stripped, and a model that
      controls the body of the exec'd code controls the agent.
    fix: >
      Remove eval/exec/compile from the tool. Replace dynamic evaluation with
      a constrained interpreter (asteval, RestrictedPython) only if the use
      case truly requires expression evaluation; for arithmetic,
      ast.literal_eval is safe. If the tool is intentionally a code-execution
      surface (e.g. notebook-style), run the exec inside a separate process
      with seccomp + no network + no filesystem write, and treat the process
      as a single-use sacrificial sandbox.

  - id: OAI-017
    title: TypeScript tool body calls eval / new Function on dynamic input
    severity: high
    confidence: 0.9
    language: typescript
    applies_to:
      - openai_tool
    scope: tool
    match:
      has_code_exec_call: true
    explanation: >
      A TypeScript tool body invokes `eval()` or constructs a `new Function(...)`
      from a string. When any portion of that string flows from the model
      (directly, via tool arguments, or via session state the model writes to),
      the call is arbitrary-code-execution inside the agent's Node / Worker /
      browser runtime. No OS-level sandbox stands between the call and the
      runtime's full capabilities: file I/O, env-var access, fetch credentials,
      and the agent's own keys in memory are all reachable from the evaluated
      string. Even a `with({})`-restricted scope is escapable through
      globalThis, prototype chains, and the platform API surface unless
      explicitly stripped. The miner-flagged `calculate` tool in the Claude
      SDK template feeds a tool argument straight into `eval` to act as a math
      evaluator — the canonical worst-case shape.
    fix: >
      Remove `eval` and `new Function` from the tool. For arithmetic, parse
      the input with a hardened expression library (`mathjs`, `expr-eval`)
      configured to disallow function calls and property access. If the tool
      genuinely needs to run model-supplied code, isolate it: a separate
      Worker with no bindings (no env, no KV, no secrets), a
      `vm.createContext` with an empty global plus a CPU/memory/time limit,
      or a sandboxed iframe with the network and storage origins stripped.
      Treat the sandbox as single-use and discard it after every call.
