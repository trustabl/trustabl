policy:
  id: openai_sdk_approvals
  name: OpenAI Agents SDK tool approval gates
  category: openai_sdk
  description: >
    Rules covering the human-in-the-loop approval gate the OpenAI Agents SDK
    offers on sensitive tool calls. The SDK exposes needs_approval on
    @function_tool (and on hosted tools); its default is False everywhere, so a
    privileged tool ships un-gated unless the author opts in.

rules:
  - id: OAI-014
    title: Privileged tool has no needs_approval gate
    severity: high
    confidence: 0.7
    language: python
    applies_to:
      - openai_tool
    scope: tool
    match:
      all:
        - any:
            - has_shell_call: true
            - has_code_exec_call: true
            - has_write_call: true
        - any:
            - not:
                tool_decorator_kwarg_present:
                  - needs_approval
            - tool_decorator_kwarg_value:
                kwarg: needs_approval
                value: "False"
    explanation: >
      This @function_tool shells out, executes dynamic code, or writes the
      filesystem, but has no needs_approval gate — the kwarg is absent or
      explicitly set to False. needs_approval is the OpenAI
      Agents SDK's documented human-in-the-loop gate for sensitive tool calls,
      and its default is False — so an un-gated privileged tool executes
      attacker-influenced model output with no human checkpoint. Passing True
      or a per-call approval callable both count as a gate and do not fire. This complements
      OAI-012 (subprocess) and OAI-013 (eval/exec): those flag the dangerous
      call; OAI-014 flags the missing approval gate around it.
    fix: >
      Pass needs_approval=True to the @function_tool decorator for tools that
      execute commands, run code, or mutate the filesystem, and handle the
      resulting approval items in your run loop. If approval is intentionally
      automated for a trusted tool, gate the tool at the agent level
      (input_guardrails) instead and document the decision.

  - id: OAI-111
    title: Agent wires a privileged hosted tool without needs_approval
    severity: high
    confidence: 0.75
    language: python
    applies_to:
      - openai_agent
      - openai_sandbox_agent
    scope: agent
    match:
      any:
        - all:
            - agent_uses_hosted_tool_class: [ShellTool]
            - any:
                - not:
                    agent_hosted_tool_kwarg_present:
                      class: ShellTool
                      kwarg: needs_approval
                - agent_hosted_tool_kwarg_value:
                    class: ShellTool
                    kwarg: needs_approval
                    value: "False"
        - all:
            - agent_uses_hosted_tool_class: [LocalShellTool]
            - any:
                - not:
                    agent_hosted_tool_kwarg_present:
                      class: LocalShellTool
                      kwarg: needs_approval
                - agent_hosted_tool_kwarg_value:
                    class: LocalShellTool
                    kwarg: needs_approval
                    value: "False"
        - all:
            - agent_uses_hosted_tool_class: [CodeInterpreterTool]
            - any:
                - not:
                    agent_hosted_tool_kwarg_present:
                      class: CodeInterpreterTool
                      kwarg: needs_approval
                - agent_hosted_tool_kwarg_value:
                    class: CodeInterpreterTool
                    kwarg: needs_approval
                    value: "False"
        - all:
            - agent_uses_hosted_tool_class: [ApplyPatchTool]
            - any:
                - not:
                    agent_hosted_tool_kwarg_present:
                      class: ApplyPatchTool
                      kwarg: needs_approval
                - agent_hosted_tool_kwarg_value:
                    class: ApplyPatchTool
                    kwarg: needs_approval
                    value: "False"
    explanation: >
      This agent wires a privileged hosted tool — ShellTool or LocalShellTool
      (run shell commands), CodeInterpreterTool (run code), or ApplyPatchTool
      (edit files) — with no needs_approval gate: the kwarg is absent or
      explicitly False. needs_approval
      defaults to False on these tools, so without an explicit opt-in the model
      executes commands, code, or file edits with no human checkpoint. Setting
      it to True or to a per-call approval callable both count as a gate and
      do not fire this rule.
      needs_approval is the SDK's human-in-the-loop gate for exactly this class
      of tool.
    fix: >
      Construct the privileged tool with needs_approval=True and handle the
      resulting approval items in your run loop, or wrap the agent with
      input_guardrails that screen what can reach it. Prefer SandboxAgent to
      confine what the tool can do.
