policy:
  id: openai_sdk_network
  name: OpenAI Agents SDK network hygiene
  category: openai_sdk
  description: >
    Rules covering outbound network calls made from inside OpenAI Agents SDK
    tools. The SDK does not enforce timeouts; they must be set explicitly.

rules:
  - id: OAI-005
    title: Network call has no timeout
    severity: high
    confidence: 0.85
    language: python
    applies_to:
      - openai_tool
    scope: tool
    match:
      call_without_kwarg:
        callees:
          - requests.get
          - requests.post
          - requests.put
          - requests.delete
          - requests.patch
          - requests.head
          - requests.request
          - requests.Session.get
          - requests.Session.post
          - httpx.get
          - httpx.post
          - httpx.put
          - httpx.delete
          - httpx.patch
          - httpx.head
          - httpx.request
          # Aliased aiohttp sessions canonicalize to aiohttp.ClientSession.<m>.
          - aiohttp.ClientSession.get
          - aiohttp.ClientSession.post
        missing: timeout
    explanation: >
      An OpenAI Agents SDK tool that makes a network request without a
      timeout can hang indefinitely, blocking the agent's run loop and
      consuming the conversation's wall-clock budget. The SDK does not
      enforce timeouts on tool code.
    fix: >
      Pass timeout= (typically 5-30 seconds depending on the endpoint).
      Surface timeouts as a structured tool error the model can react to,
      using failure_error_function (see OAI-004).

  - id: OAI-011
    title: urllib network call has no timeout
    severity: high
    confidence: 0.85
    language: python
    applies_to:
      - openai_tool
    scope: tool
    match:
      call_without_kwarg:
        callees:
          - urllib.request.urlopen
          - urlopen
        missing: timeout
    explanation: >
      An OpenAI Agents SDK tool that calls urllib.request.urlopen without
      timeout= can hang on a slow or unresponsive host. Python's default for
      urlopen is socket._GLOBAL_DEFAULT_TIMEOUT, which is None unless
      socket.setdefaulttimeout has been called process-wide; in practice
      that means no timeout. The agent's run loop blocks inside the tool
      until the OS-level TCP timeout (often minutes), consuming the
      conversation's wall-clock budget and tying up the worker.
    fix: >
      Pass timeout= (typically 5-30 seconds depending on the endpoint) to
      every urllib.request.urlopen call. Surface timeouts as a structured
      tool error the model can react to using failure_error_function (see
      OAI-004). OAI-005 covers the equivalent gap for requests/httpx callees.

  - id: OAI-016
    title: TypeScript tool fetch call has no AbortSignal timeout
    severity: high
    confidence: 0.6
    language: typescript
    applies_to:
      - openai_tool
    scope: tool
    match:
      has_http_call_without_timeout: true
    explanation: >
      An OpenAI Agents SDK tool authored in TypeScript makes an HTTP call
      (`fetch` / `axios` / `got`) without a timeout bound — no `signal`,
      `timeout`, or `abortSignal` option. Node's and the browser's `fetch`
      have no implicit timeout; a slow or unresponsive host blocks the tool's
      `execute` callback indefinitely, which in turn blocks the agent's run
      loop, consumes the conversation's wall-clock budget, and ties up the
      worker that owns the request. Tools that fetch URLs interpolated from
      tool arguments also amplify SSRF and exfiltration impact: the call
      cannot be cancelled even when downstream behaviour goes obviously wrong.
    fix: >
      Attach an AbortSignal that fires after a bounded deadline. Modern
      runtimes: `await fetch(url, { signal: AbortSignal.timeout(15_000) })`.
      For runtimes without `AbortSignal.timeout`, create an `AbortController`,
      schedule `controller.abort()` via `setTimeout`, pass `controller.signal`
      to `fetch`, and clear the timer in a `finally` block. Surface the
      resulting `AbortError` as a structured tool error the model can react
      to (see OAI-004's `failure_error_function` for the Python equivalent).

  - id: OAI-018
    title: Tool builds outbound URL from non-literal value
    severity: medium
    confidence: 0.55
    language: python
    applies_to:
      - openai_tool
    scope: tool
    match:
      has_dynamic_url_call: true
    explanation: >
      An OpenAI Agents SDK tool builds its outbound HTTP URL from a
      non-literal value — typically a tool parameter interpolated into an
      f-string or concatenated onto a base URL. Because tool arguments are
      produced by the model from conversation context (including prior tool
      output and user input), an attacker who can shape that context can
      steer the request to an attacker-controlled host or to an internal
      address the agent's network egress can reach but the model was never
      meant to touch. The same channel also leaks request bodies (auth
      headers, JSON payloads, the model's reasoning) to whichever host the
      URL resolves to, so the failure mode is both SSRF and data
      exfiltration in one call.
    fix: >
      Treat the model-supplied value as untrusted input to URL construction.
      Validate it against an allow-list of permitted hosts/path segments
      before any HTTP client touches it, or look the value up against a
      server-side registry and build the URL from the registry's trusted
      entry. If the value is meant to be an opaque ID (e.g. a connection_id),
      pass it as a query parameter or path segment of a fixed base URL and
      reject characters that would let it escape that slot.

  - id: OAI-024
    title: TypeScript tool builds outbound URL from a non-literal value
    severity: medium
    confidence: 0.6
    language: typescript
    applies_to:
      - openai_tool
    scope: tool
    match:
      has_dynamic_url_call: true
    explanation: >
      This OpenAI Agents SDK tool authored in TypeScript constructs its outbound
      HTTP URL from a non-literal value — a template-string substitution, an
      identifier, or a concatenation — typically a tool argument the model
      produced from conversation context. An attacker shaping that context can
      redirect the request to an attacker-controlled host or to an internal
      address the agent's egress can reach (SSRF), and can leak request bodies,
      headers, and credentials to whichever host the URL resolves to. The fact is
      recognized for the `fetch`/`axios`/`got`/`undici` clients by inspecting the
      first argument; a plain string-literal URL does not fire.
    fix: >
      Treat the model-supplied value as untrusted URL input. Validate it against
      an allow-list of permitted hosts and path segments before any HTTP client
      touches it, or resolve an opaque ID against a server-side registry and build
      the URL from the trusted entry. Reject characters that let the value escape
      its intended path or query slot.
