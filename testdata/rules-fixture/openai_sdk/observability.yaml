policy:
  id: openai_sdk_observability
  name: OpenAI Agents SDK tool observability hygiene
  category: openai_sdk
  description: >
    Rules covering how an OpenAI Agents SDK tool emits diagnostics. Tool bodies
    that print to stdout are invisible to the model and can corrupt stdio-based
    transports (MCP) that share the channel.

rules:
  - id: OAI-010
    title: Tool function prints to stdout for diagnostics
    severity: low
    confidence: 0.65
    language: python
    applies_to:
      - openai_tool
    scope: tool
    match:
      has_body_text:
        - print(
    explanation: >
      The @function_tool body calls print(), which writes diagnostics to the
      process's stdout. The model never sees that output — only the return
      value flows back into the agent loop — so the print silently disappears
      in production logs that capture structured records but not raw stdout.
      If the same tool is ever exposed over an MCP stdio server (or any
      transport that uses stdout as a protocol channel), the loose print
      frames will interleave with JSON-RPC messages and corrupt the stream.
    fix: >
      Remove the print() calls. If the information is needed for ops, emit it
      through a module logger (logging.getLogger(__name__).info(...)) so it
      lands in the application's log sink. If the information needs to reach
      the model, include it in the tool's return value instead.
