policy:
  id: openai_sdk_agent_safety
  name: OpenAI Agents SDK agent wiring safety
  category: openai_sdk
  description: >
    Agent-scoped rules for the OpenAI Agents SDK. These fire per Agent(...) /
    SandboxAgent(...) call and inspect the constructor kwargs and the
    resolved tools / handoffs / guardrails graph.

rules:
  - id: OAI-101
    title: Agent has no input_guardrails AND wires shell or filesystem-touching tools
    severity: high
    confidence: 0.85
    language: python
    applies_to:
      - openai_agent
      - openai_sandbox_agent
    scope: agent
    match:
      all:
        - agent_kwarg_list_empty: [input_guardrails]
        - agent_uses_tool_kind: [shell_invocation]
    explanation: >
      This agent is wired with tools that execute shell commands or touch
      the filesystem, but has no input_guardrails configured. A prompt-
      injection user input can reach the shell-invoking tool with no
      pre-check; guardrails are the OpenAI Agents SDK's primary defense
      against this class of attack.
    fix: >
      Add at least one @input_guardrail validating that the user input is
      safe to dispatch to shell tools, and wire it via input_guardrails=[...]
      on the Agent(...) constructor. The guardrail should return
      GuardrailFunctionOutput(tripwire_triggered=True, ...) on rejected input.

  - id: OAI-102
    title: Agent uses tool_use_behavior="stop_on_first_tool"
    severity: high
    confidence: 0.95
    language: python
    applies_to:
      - openai_agent
      - openai_sandbox_agent
    scope: agent
    match:
      agent_kwarg_value:
        kwarg: tool_use_behavior
        value: stop_on_first_tool
    explanation: >
      With tool_use_behavior="stop_on_first_tool", the first tool's raw
      output becomes the agent's final response without any model
      post-processing. If the tool returns attacker-controlled data (web
      search results, untrusted file contents, MCP-provided tool output),
      that data is rendered to the user verbatim — an exfiltration and
      prompt-injection vector.
    fix: >
      Remove the tool_use_behavior="stop_on_first_tool" kwarg (the default
      "run_llm_again" is safe) or constrain it via StopAtTools(...) listing
      only tools whose outputs you control.

  - id: OAI-103
    title: tool_choice="required" combined with reset_tool_choice=False
    severity: high
    confidence: 0.95
    language: python
    applies_to:
      - openai_agent
      - openai_sandbox_agent
    scope: agent
    match:
      all:
        - agent_kwarg_value:
            kwarg: model_settings.tool_choice
            value: required
        - agent_kwarg_value:
            kwarg: reset_tool_choice
            value: "False"
    explanation: >
      The agent forces tool use on every turn (tool_choice="required") AND
      does not reset the tool choice after each call (reset_tool_choice=False).
      This is the SDK's documented loop pattern: the model is required to
      call a tool, calls one, and is required to call another, indefinitely.
    fix: >
      Either drop reset_tool_choice=False (the default True breaks the loop)
      or change tool_choice to "auto". If forced tool use is intentional,
      ensure at least one of the tools terminates the agent via
      tool_use_behavior=StopAtTools(...).

  - id: OAI-104
    title: Raw Agent (not SandboxAgent) wires shell or filesystem-touching tools
    severity: medium
    confidence: 0.75
    language: python
    applies_to:
      - openai_agent
    scope: agent
    match:
      all:
        - agent_class: [Agent]
        - agent_uses_tool_kind: [shell_invocation]
    explanation: >
      This agent uses the plain Agent class with tools that touch the
      shell or filesystem. The SDK ships SandboxAgent specifically to gate
      privileged tools inside an isolated workspace; using raw Agent
      surfaces the host environment to the agent directly.
    fix: >
      Switch from Agent(...) to SandboxAgent(...) and define a Manifest
      restricting the file paths and commands the agent can reach. If the
      privileged tools are needed but sandboxing is impractical, document
      the decision and acknowledge the elevated risk explicitly.

  - id: OAI-109
    title: Agent uses WebSearchTool without input_guardrails
    severity: high
    confidence: 0.85
    language: python
    applies_to:
      - openai_agent
      - openai_sandbox_agent
    scope: agent
    match:
      all:
        - agent_uses_hosted_tool_class: [WebSearchTool]
        - agent_kwarg_list_empty: [input_guardrails]
    explanation: >
      This agent is wired with WebSearchTool, which fetches content from the
      public internet, but has no input_guardrails configured. Web search
      results are untrusted external data that can contain prompt injection
      payloads. An attacker can craft malicious content on a page they control;
      when the agent searches and retrieves that content, the injected
      instructions can hijack the agent's behavior — exfiltrating data, calling
      other tools, or manipulating outputs.
    fix: >
      Add at least one @input_guardrail that validates user queries before they
      reach WebSearchTool. The guardrail should reject queries that could lead
      to attacker-controlled content (e.g. queries containing raw URLs or
      suspicious redirection patterns). Wire it via input_guardrails=[...] on
      the Agent(...) constructor.

  - id: OAI-110
    title: Agent wires a content-fetching tool without output_guardrails
    severity: medium
    confidence: 0.6
    language: python
    applies_to:
      - openai_agent
      - openai_sandbox_agent
    scope: agent
    match:
      all:
        - agent_kwarg_list_empty: [output_guardrails]
        - agent_uses_hosted_tool_class: [WebSearchTool, FileSearchTool, CodeInterpreterTool]
    explanation: >
      This agent pulls in untrusted external content (web search, file search,
      or a code interpreter) but has no output_guardrails. Input guardrails
      (OAI-101/106/109) screen what reaches the model; output guardrails are
      the SDK's mechanism to screen the final response before it reaches the
      user. Without them, a prompt-injected tool result can drive an
      exfiltrating or unsafe final answer with nothing inspecting the egress.
      The check is scoped to agents that actually wire a content-fetching
      hosted tool, since a plain agent legitimately needs no output guardrail.
    fix: >
      Add at least one output guardrail (a function decorated @output_guardrail
      or an OutputGuardrail instance) and wire it via output_guardrails=[...]
      on the Agent(...) constructor. It should inspect the final output for
      data exfiltration and unsafe content before it is returned.

  - id: OAI-105
    title: TypeScript agent wires a content-fetching hosted tool without inputGuardrails
    severity: high
    confidence: 0.8
    language: typescript
    applies_to:
      - openai_agent
    scope: agent
    match:
      all:
        - agent_uses_hosted_tool_class: [webSearchTool, fileSearchTool, hostedMcpTool]
        - agent_kwarg_list_empty: [inputGuardrails]
    explanation: >
      This OpenAI Agents SDK agent authored in TypeScript wires a content-fetching
      hosted tool (`webSearchTool`, `fileSearchTool`, or `hostedMcpTool`) but
      configures no `inputGuardrails`. These tools pull untrusted external
      content — web pages, indexed files, or MCP-advertised tool output — that can
      carry prompt-injection payloads. With no input guardrail screening what
      reaches the model, injected instructions can hijack the agent into
      exfiltrating data or invoking other tools. The rule requires a resolved
      hosted-tool reference, so an agent with an opaque (non-literal) options
      object cannot trip it on the empty-list clause alone.
    fix: >
      Add at least one guardrail built with `defineInputGuardrail(...)` that
      validates user input and resolved tool context before the model runs, and
      wire it via `inputGuardrails: [...]` on the `Agent({...})` constructor. Pin
      MCP servers to trusted endpoints and treat web and file results as untrusted
      data.
