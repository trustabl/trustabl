policy:
  id: openai_sdk_tool_definition
  name: OpenAI Agents SDK tool definition hygiene
  category: openai_sdk
  description: >
    Rules covering the structural hygiene of OpenAI Agents SDK @function_tool
    definitions. These map to the SDK's expectations: the docstring is the
    model-facing description; type hints drive the auto-generated JSON schema.

rules:
  - id: OAI-001
    title: Tool function has no docstring
    severity: low
    confidence: 0.9
    language: python
    applies_to:
      - openai_tool
    scope: tool
    match:
      has_docstring: false
    explanation: >
      The OpenAI Agents SDK uses the @function_tool's docstring as the
      description sent to the model when it decides whether to call this
      tool. Without a docstring, the model has no information to base its
      selection on, leading to incorrect or skipped tool calls.
    fix: >
      Add a one-line docstring describing what this tool does and when the
      model should call it. Optionally describe parameters in a structured
      format (Google or NumPy style) for richer schema metadata.

  - id: OAI-002
    title: Tool function has no type-annotated parameters
    severity: medium
    confidence: 0.85
    language: python
    applies_to:
      - openai_tool
    scope: tool
    match:
      has_params: true
      has_typed_params: false
    explanation: >
      The OpenAI Agents SDK auto-generates a JSON schema for the tool from
      Python type annotations. Without annotations, the schema is degraded
      (parameters become Any), and the model receives unconstrained inputs
      that frequently cause runtime errors.
    fix: >
      Add type hints to every parameter (def fetch(url: str, timeout: int = 10) -> dict).
      Use Pydantic models or TypedDict for structured inputs when complex.

  - id: OAI-007
    title: Ambiguous tool name
    severity: low
    confidence: 0.9
    language: python
    applies_to:
      - openai_tool
    scope: tool
    match:
      name_in:
        - process
        - handle
        - run
        - do
        - execute
        - perform
        - work
        - go
        - thing
        - stuff
    explanation: >
      Tool names like `process`, `handle`, or `run` give the model no signal
      about intent. The model will either call this tool for the wrong job or
      refuse to call it at all when a better-named alternative is present.
    fix: >
      Rename to a verb-object form, e.g. `summarize_invoice`, `fetch_weather`.

  - id: OAI-022
    title: TypeScript tool has no description
    severity: low
    confidence: 0.85
    language: typescript
    applies_to:
      - openai_tool
    scope: tool
    match:
      has_docstring: false
    explanation: >
      The OpenAI Agents SDK sends a TypeScript tool's `description` to the model
      as the basis for deciding whether to call it. A `tool({...})` with an empty
      or missing `description` gives the model no selection signal, causing
      wrong-tool calls or skipped calls. A description built from a non-literal
      expression is captured as empty and also fires.
    fix: >
      Provide a concise `description` string in the `tool({...})` options stating
      what the tool does and when the model should call it. The description is the
      model's primary routing signal alongside the tool name.
