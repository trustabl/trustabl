policy:
  id: openshell_resources
  name: Resource limits
  category: openshell
  description: >
    Manifest-level rules that fire once per scan. They surface gaps in the
    repo's OpenShell policy itself, not in any specific tool.

rules:
  - id: OSH-004
    title: No OpenShell resource limits configured
    scope: repo
    severity: medium
    confidence: 0.95
    language: python
    applies_to:
      - openshell
    match: {}
    explanation: >
      The repo declares no OpenShell policy with cpu/memory/time limits. A
      runaway tool call (infinite loop, memory blow-up) is unbounded by
      default.
    fix: >
      The generated openshell/policy.yaml will include default limits —
      review them against your expected workloads before committing.
    fix_hints:
      policy_emit: default_resource_limits
