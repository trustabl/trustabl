policy:
  id: openshell_network
  name: Network egress containment
  category: openshell
  description: >
    Rules that flag broad outbound network access from agent tools. The
    OpenShell sandbox can gate egress by hostname allowlist — strictly more
    reliable than enforcing it inside Python.

rules:
  - id: OSH-005
    title: Network egress is unrestricted
    scope: tool
    severity: high
    confidence: 0.7
    language: python
    applies_to:
      - claude_sdk_tool
      - mcp_tool
      - shell_invocation
    match:
      all:
        - has_dynamic_url_call: true
        - not:
            has_body_text:
              - ALLOWED_HOSTS
              - allowed_hosts
    explanation: >
      The tool issues HTTP calls to a URL derived from inputs, with no host
      allowlist in the code path. OpenShell can restrict outbound DNS/connect
      at the sandbox layer, which is strictly more reliable than enforcing it
      in Python.
    fix: >
      Define an allowlist of hostnames the tool may reach. The generated
      OpenShell policy will gate egress to those hosts.
    fix_hints:
      policy_emit: network_allowlist
