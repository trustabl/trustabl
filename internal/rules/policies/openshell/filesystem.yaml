policy:
  id: openshell_filesystem
  name: Filesystem write containment
  category: openshell
  description: >
    Rules that flag unrestricted filesystem writes from agent tools. The
    generated OpenShell policy gates writes to a prefix at the sandbox layer.

rules:
  - id: OSH-003
    title: Filesystem write without sandbox restriction
    scope: tool
    severity: high
    confidence: 0.8
    language: python
    applies_to:
      - claude_sdk_tool
      - mcp_tool
      - shell_invocation
    match:
      has_write_call: true
    explanation: >
      The tool writes to or deletes from the filesystem. Without an OpenShell
      write-prefix restriction, a path-traversal in the input lets the agent
      clobber files outside its working directory.
    fix: >
      Constrain writes to a single working directory and let the generated
      OpenShell policy enforce the prefix at the sandbox layer.
    fix_hints:
      policy_emit: fs_write_prefix
