# Example workflow: run Trustabl and publish findings to GitHub Code Scanning.
#
# Copy this into your own agent-SDK repository at
# .github/workflows/trustabl.yml and adjust the scan target if your code
# does not live at the repository root.
#
# It runs Trustabl, writes a SARIF 2.1.0 report to a file, and uploads that
# file with github/codeql-action/upload-sarif so the findings appear in the
# repository's Security tab (Code Scanning alerts). It does NOT run against
# the Trustabl engine repository itself, which is why it lives under docs/
# (GitHub never executes workflow files outside .github/workflows/).
name: Trustabl

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  # Required by upload-sarif to write Code Scanning results.
  security-events: write

jobs:
  trustabl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Run the scan and write SARIF to a file. --output writes the report
      # regardless of the exit code, and continue-on-error keeps the job alive
      # when Trustabl exits 1 (findings of medium severity or higher were
      # found) so the upload step below still runs.
      - name: Run Trustabl
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/repo" \
            ghcr.io/trustabl/trustabl:latest \
            scan /repo --format sarif --output /repo/trustabl.sarif

      # Publish the report. if: always() ensures the upload happens even when
      # the scan step reported findings (and therefore "failed" above).
      - name: Upload SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trustabl.sarif
          category: trustabl
